<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview - AI Interview Assistant</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="interview-page">

    <!-- ================= HEADER ================= -->

    <div class="interview-header">

        <!-- LEFT -->
        <div class="header-left">

            <div class="interview-icon">
                💼
            </div>

            <div class="interview-meta">
                <h3 id="interview-title">HR Interview</h3>

                <div id="interview-subtitle">
                    Topic: General Questions
                </div>
            </div>

        </div>

        <!-- RIGHT -->
        <div class="header-right">

            <div class="score-display">
                Score:
                <span id="current-score">0.0</span>/10
            </div>

            <button class="btn-end" onclick="endInterview()">
                ⏹ End Interview
            </button>

        </div>

    </div>

    <!-- ================= CHAT ================= -->

    <div class="chat-area" id="chat-area">

    </div>

    <!-- ================= INPUT ================= -->

    <div class="input-area">

        <button 
            class="btn-mic" 
            id="mic-btn"
            onclick="toggleVoice()"
            title="Voice Input"
        >
            🎤
        </button>

        <textarea
            id="answer-input"
            placeholder="Type your answer here..."
            rows="1"
        ></textarea>

        <button 
            class="btn-send"
            onclick="sendAnswer()"
            title="Send"
        >
            ➤
        </button>

    </div>

</div>

<script src="js/interview.js"></script>

</body>
</html>
